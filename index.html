<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAT 💖</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet"
/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(135deg,#ff9a9e 0%,#fad0c4 50%,#a18cd1 100%);
    position:relative;
}

/* Floating hearts */
body::before,
body::after{
    content:"❤";
    position:absolute;
    font-size:80px;
    color:rgba(255,255,255,.15);
    animation:float 8s infinite ease-in-out;
}

body::before{
    top:10%;
    left:10%;
}

body::after{
    bottom:10%;
    right:10%;
    animation-delay:3s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0) rotate(0deg);
    }
    50%{
        transform:translateY(-30px) rotate(10deg);
    }
}

.main-card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 20px 60px rgba(0,0,0,.15);
    border-radius:32px;
    padding:40px;
    text-align:center;
    max-width:500px;
    position: relative;
}

.main-card img{
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.move-away{
    transition:.3s ease;
    position:relative;
}

button{
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

#videoModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(10px);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-card{
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    text-align:center;
    animation:pop .4s ease;
}

#yesBtn{
    transition: transform .3s ease;
    transform-origin: center;
}

@keyframes pop{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="main-card">

    <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">
        💍MISS MO BA AKO?
    </h1>

    <p class="text-white/90 mb-8">
        Please choose wisely... 😌💕
    </p>

    <div class="w-[320px] mx-auto mb-8">
        <img src="angry.webp"
        class="w-full h-auto object-cover">
    </div>

    <div class="flex justify-center gap-4 flex-wrap">

        <button
        id="yesBtn"
        class="px-8 py-3 rounded-full
        bg-gradient-to-r from-pink-500 to-rose-500
        text-white font-semibold shadow-xl">
            💖 Yes
        </button>

        <button
        id="noBtn"
        class="move-away px-8 py-3 rounded-full
        bg-gradient-to-r from-red-500 to-red-400
        text-white font-semibold shadow-xl">
            😤 No
        </button>

        <button
        id="maybeBtn"
        class="move-away px-8 py-3 rounded-full
        bg-gradient-to-r from-yellow-400 to-orange-400
        text-white font-semibold shadow-xl">
            🤔 Maybe
        </button>

    </div>

</div>

<!-- MODAL -->
<div id="videoModal">

    <div class="modal-card max-w-lg">

        <h2 class="text-3xl font-bold text-pink-600 mb-5">
            WEH DI NGA!!! 💖
        </h2>

        <video
        id="reactionVideo"
        controls
        class="rounded-2xl shadow-xl mx-auto w-[300px]">
            <source src="tagumpay.mp4" type="video/mp4">
        </video>

        <button
        onclick="closeModal()"
        class="mt-6 px-6 py-3 rounded-full
        bg-gray-900 text-white hover:bg-black">
            Close
        </button>

    </div>

</div>

<script>

const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');
const maybeBtn = document.getElementById('maybeBtn');

const modal = document.getElementById('videoModal');
const video = document.getElementById('reactionVideo');

function moveButton(btn) {

    const card = document.querySelector(".main-card");

    const cardRect = card.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    // Maximum area inside the card
    const maxX = cardRect.width - btnRect.width - 20;
    const maxY = cardRect.height - btnRect.height - 20;

    // Random position
    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Desktop
document.addEventListener("mousemove", (e) => {
    dodgeButton(noBtn, e);
    dodgeButton(maybeBtn, e);
});

// Mobile
document.addEventListener("touchmove", (e) => {

    const touch = e.touches[0];

    dodgeButton(noBtn, {
        clientX: touch.clientX,
        clientY: touch.clientY
    });

    dodgeButton(maybeBtn, {
        clientX: touch.clientX,
        clientY: touch.clientY
    });

}, { passive: true });

yesBtn.addEventListener('click',()=>{

    modal.style.display='flex';

    video.currentTime=0;
    video.play();
});

function escapeButton(btn) {

    const rect = btn.getBoundingClientRect();

    const padding = 20;

    const maxX = window.innerWidth - rect.width - padding;
    const maxY = window.innerHeight - rect.height - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    btn.style.position = "fixed";
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

noBtn.addEventListener("touchstart", function(e){
    e.preventDefault();

    growYes();
    escapeButton(noBtn);
});

maybeBtn.addEventListener("touchstart", function(e){
    e.preventDefault();

    growYes();
    escapeButton(maybeBtn);
});

let yesScale = 1;

function growYes() {

    yesScale += 0.12;

    // Limit the maximum size
    if (yesScale > 2.5) {
        yesScale = 2.5;
    }

    yesBtn.style.transform = `scale(${yesScale})`;
}

function dodgeButton(btn, e){

    

    const rect = btn.getBoundingClientRect();

    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const distance = Math.hypot(
        e.clientX-centerX,
        e.clientY-centerY
    );

    // Starts running away when the cursor gets close
   if(distance < 120){

    growYes();

    const angle = Math.atan2(
        centerY-e.clientY,
        centerX-e.clientX
    );

        const speed = 150;

        let x = rect.left + Math.cos(angle)*speed;
        let y = rect.top + Math.sin(angle)*speed;

        const maxX = window.innerWidth-rect.width-20;
        const maxY = window.innerHeight-rect.height-20;

        x = Math.max(20,Math.min(maxX,x));
        y = Math.max(20,Math.min(maxY,y));

        btn.style.position="fixed";
        btn.style.left=x+"px";
        btn.style.top=y+"px";
    }
}

function closeModal(){

    modal.style.display='none';

    video.pause();
    video.currentTime=0;
}

</script>

</body>
</html>
